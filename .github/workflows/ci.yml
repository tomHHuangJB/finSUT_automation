name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build backend and frontend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crd_sut
          POSTGRES_USER: crd_app
          POSTGRES_PASSWORD: crd_app_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crd_app -d crd_sut"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: crd-sut/frontend/package-lock.json

      - name: Initialize database extensions
        run: docker exec ${{ job.services.postgres.id }} psql -U crd_app -d crd_sut -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"

      - name: Run backend tests
        working-directory: crd-sut/backend
        run: mvn -B test

      - name: Install frontend dependencies
        working-directory: crd-sut/frontend
        run: npm ci

      - name: Build frontend
        working-directory: crd-sut/frontend
        run: npm run build

  integration:
    name: Integration automation
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crd_sut
          POSTGRES_USER: crd_app
          POSTGRES_PASSWORD: crd_app_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crd_app -d crd_sut"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: crd-sut/frontend/package-lock.json

      - name: Initialize database extensions
        run: docker exec ${{ job.services.postgres.id }} psql -U crd_app -d crd_sut -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"

      - name: Install frontend dependencies
        working-directory: crd-sut/frontend
        run: npm ci

      - name: Build backend
        working-directory: crd-sut/backend
        run: mvn -B -DskipTests package

      - name: Install Playwright Chromium
        working-directory: crd-tests
        run: mvn -B exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps chromium"

      - name: Start backend
        working-directory: crd-sut/backend
        run: |
          nohup mvn -B spring-boot:run > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for backend
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8080/api/v1/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat crd-sut/backend/backend.log
          exit 1

      - name: Start frontend
        working-directory: crd-sut/frontend
        run: |
          nohup npm run dev -- --host 127.0.0.1 > frontend.log 2>&1 &
          echo $! > frontend.pid

      - name: Wait for frontend proxy
        run: |
          for i in {1..60}; do
            if curl -fsS -u pm_user:password http://127.0.0.1:5173/api/v1/orders > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat crd-sut/frontend/frontend.log
          cat crd-sut/backend/backend.log
          exit 1

      - name: Run integration tests
        working-directory: crd-tests
        run: >-
          mvn -B test
          -Dbackend.base.url=http://127.0.0.1:8080
          -Dfrontend.base.url=http://127.0.0.1:5173
          -Ddb.url=jdbc:postgresql://127.0.0.1:5432/crd_sut

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: crd-sut/backend/backend.log

      - name: Upload frontend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-log
          path: crd-sut/frontend/frontend.log

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crd-tests-surefire-reports
          path: crd-tests/target/surefire-reports/
